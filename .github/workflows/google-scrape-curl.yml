name: Daily Google Scraper (curl_cffi)

on:
  schedule:
    # KST 08:54 = UTC 23:54 (전일)
    - cron: '54 23 * * *'
  workflow_dispatch:
    inputs:
      extra_keyword:
        description: 'Extra keyword to scrape (optional)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend/backend
          pip install -r requirements.txt
          pip install curl_cffi

      - name: Random initial sleep (0~1927s)
        run: |
          SLEEP=$((RANDOM % 1927))
          echo "Sleeping ${SLEEP} seconds before scrape..."
          sleep $SLEEP

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_ENV: prod
          ACCOUNT_NAME: shortmanlab
          EXTRA_KEYWORD: ${{ github.event.inputs.extra_keyword }}
        run: |
          cd backend/backend
          python google_scraper_curl.py

      - name: Update views
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_ENV: prod
        run: |
          cd backend/backend
          python view_updater.py || true
